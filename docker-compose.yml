volumes:
  postgres: ~
  composer: ~
  vendor: ~
  cache: ~
services:
  nginx:
    image: nginx:alpine
    container_name: billing.study-on.local
    working_dir: /app
    volumes:
      - .:/app
      - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/hosts/symfony:/etc/nginx/symfony
    ports:
      - "${NGINX_PORT}:80"
    links:
      - php
  postgres:
    ports:
      - "127.0.0.1:5433:5432"
    image: postgres:alpine
    volumes:
      - postgres:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pguser
  php:
    build: docker/images/php
    working_dir: /app
    volumes:
      - .:/app
      - composer:/composer
      - vendor:/app/vendor
      - cache:/app/var/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - COMPOSER_CACHE_DIR=/composer
    links:
      - postgres